a legenda'}function clr(){allOn=false;document.querySelectorAll('.pin').forEach(e=>e.classList.remove('on'));document.querySelectorAll('.li').forEach(e=>e.classList.remove('on'));document.getElementById('btnAll').classList.remove('active');document.getElementById('nfo').innerHTML='Toque nos pontos ou na legenda'}</script></body></html>
